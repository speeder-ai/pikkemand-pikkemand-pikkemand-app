  <script>
    // HAMBURGER MENU
    var navHamburger = document.getElementById('navHamburger');
    var navLinks = document.getElementById('navLinks');

    navHamburger.addEventListener('click', function () {
      var isOpen = navLinks.classList.toggle('open');
      navHamburger.classList.toggle('open', isOpen);
      navHamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    navLinks.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        navLinks.classList.remove('open');
        navHamburger.classList.remove('open');
        navHamburger.setAttribute('aria-expanded', 'false');
      });
    });

    document.addEventListener('click', function (e) {
      if (!navHamburger.contains(e.target) && !navLinks.contains(e.target)) {
        navLinks.classList.remove('open');
        navHamburger.classList.remove('open');
        navHamburger.setAttribute('aria-expanded', 'false');
      }
    });

    // CONTACT FORM
    var jobForm = document.getElementById('jobForm');
    var contactFormArea = document.querySelector('.contact-form-area');

    if (jobForm) {
      jobForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var firstName = document.getElementById('firstName').value.trim();
        var email = document.getElementById('email').value.trim();
        var jobType = document.getElementById('jobType').value;
        var description = document.getElementById('description').value.trim();

        if (!firstName || !email || !jobType || !description) {
          [document.getElementById('firstName'), document.getElementById('email'), document.getElementById('jobType'), document.getElementById('description')].forEach(function (field) {
            if (!field.value.trim()) {
              field.style.borderColor = '#EF4444';
              field.style.boxShadow = '0 0 0 3px rgba(239,68,68,0.12)';
              field.addEventListener('input', function () {
                field.style.borderColor = '';
                field.style.boxShadow = '';
              }, { once: true });
            }
          });
          return;
        }

        contactFormArea.innerHTML = '<div style="text-align:center;padding:48px 24px;">'
          + '<div style="width:64px;height:64px;background:rgba(16,185,129,0.1);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">'
          + '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
          + '</div>'
          + '<h3 style="font-family:Poppins,sans-serif;font-size:22px;font-weight:700;color:#1E293B;margin-bottom:10px;">Job Request Sent!</h3>'
          + '<p style="font-size:16px;color:#64748B;line-height:1.7;max-width:360px;margin:0 auto 24px;">We\'ll match you with vetted pros in your area within minutes. Check your inbox at <strong style="color:#2563EB;">' + email + '</strong> for your matches.</p>'
          + '<div style="display:inline-flex;align-items:center;gap:8px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;color:#15803D;">'
          + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.55 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>'
          + 'Matches arriving in ~4 minutes'
          + '</div>'
          + '</div>';
      });
    }

    // SCROLL REVEAL
    var revealObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.05, rootMargin: '0px 0px -20px 0px' });

    document.querySelectorAll('.reveal').forEach(function (el) {
      revealObserver.observe(el);
    });

    // STICKY NAV SHADOW
    window.addEventListener('scroll', function () {
      var nav = document.querySelector('.nav');
      if (window.scrollY > 20) {
        nav.style.boxShadow = '0 4px 24px rgba(37, 99, 235, 0.08)';
      } else {
        nav.style.boxShadow = 'none';
      }
    });
  <\/script>
