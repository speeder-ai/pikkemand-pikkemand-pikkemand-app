  <style>
    /* ─── Reset & Tokens ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:       #F59E0B;
      --amber-dark:  #D97706;
      --amber-light: #FDE68A;
      --amber-glow:  rgba(245,158,11,0.18);
      --red:         #EF4444;
      --red-glow:    rgba(239,68,68,0.15);
      --green:       #10B981;
      --green-glow:  rgba(16,185,129,0.15);
      --blue:        #3B82F6;
      --blue-glow:   rgba(59,130,246,0.15);
      --dark:        #0F172A;
      --text:        #1E293B;
      --muted:       #64748B;
      --border:      #E2E8F0;
      --card-bg:     #FFFFFF;
      --bg:          #F8F7F4;
      --radius:      20px;
      --shadow-card: 0 8px 40px rgba(15,23,42,0.12), 0 2px 8px rgba(15,23,42,0.06);
      --shadow-btn:  0 4px 16px rgba(245,158,11,0.30);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      user-select: none;
    }

    /* Phone Frame */
    .phone-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
    }

    .phone {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 30px 80px rgba(0,0,0,0.5), 0 0 120px rgba(245,158,11,0.08);
      display: flex;
      flex-direction: column;
    }

    /* ... (full styles as in saved page) ... */
