<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>{{COMPANY_NAME}} — Swipe to Find Your Handyman</title>
  <meta name="description" content="{{COMPANY_NAME}} — {{COMPANY_VISION}}" />
  <meta property="og:title" content="{{COMPANY_NAME}} — Find Your Perfect Handyman" />
  <meta property="og:description" content="Swipe through pre-vetted handyman profiles and book instantly. Try the {{COMPANY_NAME}} prototype." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#F59E0B" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Phosphor Icons CDN -->
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

  <style>
    /* ─── Reset & Tokens ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber:       #F59E0B;
      --amber-dark:  #D97706;
      --amber-light: #FDE68A;
      --amber-glow:  rgba(245,158,11,0.18);
      --red:         #EF4444;
      --red-glow:    rgba(239,68,68,0.15);
      --green:       #10B981;
      --green-glow:  rgba(16,185,129,0.15);
      --blue:        #3B82F6;
      --blue-glow:   rgba(59,130,246,0.15);
      --dark:        #0F172A;
      --text:        #1E293B;
      --muted:       #64748B;
      --border:      #E2E8F0;
      --card-bg:     #FFFFFF;
      --bg:          #F8F7F4;
      --radius:      20px;
      --shadow-card: 0 8px 40px rgba(15,23,42,0.12), 0 2px 8px rgba(15,23,42,0.06);
      --shadow-btn:  0 4px 16px rgba(245,158,11,0.30);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      touch-action: none;
      user-select: none;
    }

    /* ─── Phone Frame Wrapper ─── */
    .phone-frame {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
    }

    .phone {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      background: var(--bg);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 30px 80px rgba(0,0,0,0.5),
        0 0 120px rgba(245,158,11,0.08);
      display: flex;
      flex-direction: column;
    }

    /* ─── Status Bar ─── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px 0;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }
    .status-bar .time { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 15px; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .battery {
      width: 22px; height: 11px; border: 1.5px solid var(--text);
      border-radius: 3px; position: relative;
      display: flex; align-items: center; padding: 1.5px;
    }
    .battery::after {
      content: ''; position: absolute; right: -5px; top: 50%;
      transform: translateY(-50%); width: 2.5px; height: 5px;
      background: var(--text); border-radius: 0 2px 2px 0;
    }
    .battery-fill { width: 75%; height: 100%; background: var(--text); border-radius: 1px; }

    /* ─── Top Nav Bar ─── */
    .top-bar {
      padding: 12px 20px 10px;
      flex-shrink: 0;
    }
    .top-bar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .job-context {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: white;
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 2px 12px rgba(15,23,42,0.06);
      border: 1px solid var(--border);
    }
    .job-context-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .job-icon {
      width: 36px; height: 36px;
      background: var(--amber-glow);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .job-title {
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .job-meta { font-size: 11px; color: var(--muted); }
    .filter-btn {
      width: 36px; height: 36px;
      background: var(--bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: var(--amber-light); border-color: var(--amber); }
    .filter-badge {
      position: relative;
    }
    .filter-badge::after {
      content: '';
      position: absolute;
      top: 8px; right: 8px;
      width: 7px; height: 7px;
      background: var(--amber);
      border-radius: 50%;
      border: 1.5px solid var(--bg);
    }

    /* ─── Match Counter ─── */
    .match-counter {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 6px 20px 8px;
      flex-shrink: 0;
    }
    .counter-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .counter-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .counter-dot.active { background: var(--amber); }
    .counter-sep { width: 1px; height: 14px; background: var(--border); }

    /* ─── Card Stack Area ─── */
    .card-stack-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      margin: 0 16px;
    }

    /* ─── Profile Card ─── */
    .profile-card {
      position: absolute;
      inset: 0;
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      cursor: grab;
      will-change: transform;
      transition: none;
      display: flex;
      flex-direction: column;
      touch-action: none;
    }
    .profile-card:active { cursor: grabbing; }
    .profile-card.animating {
      transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.35s ease;
    }
    .profile-card.back {
      cursor: default;
      pointer-events: none;
    }

    /* Card visual states during drag */
    .swipe-label {
      position: absolute;
      top: 28px;
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 0.06em;
      border-width: 3px;
      border-style: solid;
      border-radius: 8px;
      padding: 4px 14px;
      opacity: 0;
      transform: rotate(-12deg);
      transition: opacity 0.1s;
      z-index: 10;
      pointer-events: none;
    }
    .swipe-label.request { left: 20px; color: var(--green); border-color: var(--green); transform: rotate(-12deg); }
    .swipe-label.skip    { right: 20px; color: var(--red); border-color: var(--red); transform: rotate(12deg); }

    /* ─── Card Avatar / Header ─── */
    .card-avatar-area {
      position: relative;
      height: 200px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .card-avatar-bg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-avatar-initials {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 56px;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.02em;
      text-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    .card-verified-badge {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--green);
      display: flex;
      align-items: center;
      gap: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
    }
    .card-jobs-badge {
      position: absolute;
      bottom: 14px; left: 14px;
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ─── Card Body ─── */
    .card-body {
      flex: 1;
      padding: 16px 18px 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .card-name {
      font-family: 'Poppins', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--dark);
      line-height: 1.1;
    }
    .card-location {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .card-rate {
      text-align: right;
    }
    .card-rate-value {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--amber-dark);
    }
    .card-rate-unit { font-size: 11px; color: var(--muted); }

    /* Stars */
    .stars-row {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .stars {
      display: flex;
      gap: 1px;
    }
    .star { color: var(--amber); font-size: 14px; }
    .star.empty { color: #E2E8F0; }
    .rating-text { font-size: 12px; color: var(--muted); font-weight: 500; }

    /* Tags */
    .specialty-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .tag-primary   { background: var(--amber-glow); color: var(--amber-dark); }
    .tag-secondary { background: #EFF6FF; color: #2563EB; }
    .tag-tertiary  { background: #F0FDF4; color: #16A34A; }

    /* Bio */
    .card-bio {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Response rate */
    .card-metrics {
      display: flex;
      gap: 14px;
    }
    .metric {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--muted);
      font-weight: 500;
    }
    .metric-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    /* ─── Action Buttons ─── */
    .action-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 10px 20px 14px;
      flex-shrink: 0;
    }

    .action-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      outline: none;
    }
    .action-btn:active { transform: scale(0.92) !important; }
    .action-btn:hover  { transform: scale(1.08); }

    .btn-skip {
      width: 58px; height: 58px;
      background: white;
      box-shadow: 0 4px 20px var(--red-glow), 0 2px 8px rgba(0,0,0,0.06);
      border: 2px solid #FEE2E2;
      color: var(--red);
      font-size: 24px;
    }
    .btn-request {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dark) 100%);
      box-shadow: var(--shadow-btn), 0 8px 24px rgba(245,158,11,0.35);
      color: white;
      font-size: 28px;
    }
    .btn-save {
      width: 58px; height: 58px;
      background: white;
      box-shadow: 0 4px 20px var(--blue-glow), 0 2px 8px rgba(0,0,0,0.06);
      border: 2px solid #DBEAFE;
      color: var(--blue);
      font-size: 22px;
    }

    /* ─── Bottom Navigation ─── */
    .bottom-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 10px 20px;
      background: white;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 12px;
      transition: all 0.2s;
      position: relative;
    }
    .nav-item:hover { background: var(--amber-glow); }
    .nav-icon {
      font-size: 22px;
      color: var(--muted);
      transition: color 0.2s;
    }
    .nav-item.active .nav-icon { color: var(--amber-dark); }
    .nav-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.03em;
    }
    .nav-item.active .nav-label { color: var(--amber-dark); }
    .nav-badge {
      position: absolute;
      top: 4px; right: 10px;
      background: var(--red);
      color: white;
      font-size: 9px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── Empty State ─── */
    .empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      padding: 30px;
      text-align: center;
    }
    .empty-icon {
      width: 80px; height: 80px;
      background: var(--amber-glow);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .empty-title {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--dark);
    }
    .empty-sub { font-size: 14px; color: var(--muted); line-height: 1.6; }
    .empty-reload {
      background: var(--amber);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-btn);
      transition: all 0.2s;
    }
    .empty-reload:hover { background: var(--amber-dark); transform: translateY(-1px); }

    /* ─── Toast Notification ─── */
    .toast {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--dark);
      color: white;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      white-space: nowrap;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 1000;
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(15,23,42,0.25);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.request-toast { background: linear-gradient(135deg, #10B981, #059669); }
    .toast.skip-toast    { background: linear-gradient(135deg, #64748B, #475569); }
    .toast.save-toast    { background: linear-gradient(135deg, #3B82F6, #2563EB); }

    /* ─── Swipe Hint Animation ─── */
    @keyframes hintSwipe {
      0%   { transform: rotate(0deg) translateX(0); }
      25%  { transform: rotate(4deg) translateX(16px); }
      50%  { transform: rotate(0deg) translateX(0); }
      75%  { transform: rotate(-4deg) translateX(-16px); }
      100% { transform: rotate(0deg) translateX(0); }
    }
    .hint-animate { animation: hintSwipe 1.4s ease-in-out 1.2s 1 forwards; }

    /* ─── Card Back Peek Effect ─── */
    .card-2 {
      transform: translateY(10px) scale(0.95);
      z-index: 1;
    }
    .card-3 {
      transform: translateY(20px) scale(0.90);
      z-index: 0;
    }

    /* ─── Drag Overlay Tint ─── */
    .drag-tint {
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 5;
    }
    .drag-tint.request { background: linear-gradient(135deg, rgba(16,185,129,0.18), transparent); }
    .drag-tint.skip    { background: linear-gradient(225deg, rgba(239,68,68,0.18), transparent); }

    /* Responsive: on very narrow screens, remove phone frame */
    @media (max-width: 500px) {
      .phone-frame { padding: 0; background: var(--bg); }
      .phone {
        border-radius: 0;
        max-height: 100vh;
        height: 100vh;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

<div class="phone-frame">
  <div class="phone" id="app">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time">9:41</span>
      <div class="status-icons">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
          <rect x="0" y="3" width="3" height="9" rx="1" fill="currentColor" opacity="0.4"/>
          <rect x="4.5" y="2" width="3" height="10" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="9" y="0" width="3" height="12" rx="1" fill="currentColor" opacity="0.8"/>
          <rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor"/>
        </svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="currentColor">
          <path d="M8 1.5C10.5 1.5 12.7 2.6 14.2 4.3L15.5 3C13.6 1.1 11 0 8 0C5 0 2.4 1.1 0.5 3L1.8 4.3C3.3 2.6 5.5 1.5 8 1.5Z" opacity="0.4"/>
          <path d="M8 4.5C9.7 4.5 11.2 5.2 12.3 6.4L13.6 5.1C12.1 3.5 10.2 2.5 8 2.5C5.8 2.5 3.9 3.5 2.4 5.1L3.7 6.4C4.8 5.2 6.3 4.5 8 4.5Z" opacity="0.7"/>
          <circle cx="8" cy="10" r="2"/>
        </svg>
        <div class="battery">
          <div class="battery-fill"></div>
        </div>
      </div>
    </div>

    <!-- Top Bar / Job Context -->
    <div class="top-bar">
      <div class="top-bar-label">Your Active Job</div>
      <div class="job-context">
        <div class="job-context-left">
          <div class="job-icon">🔧</div>
          <div>
            <div class="job-title">Fix leaky kitchen faucet</div>
            <div class="job-meta">Posted 2h ago · Tallinn, Estonia</div>
          </div>
        </div>
        <div class="filter-btn filter-badge" onclick="showToast('Filters coming soon!', 'save')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Match Counter / Progress -->
    <div class="match-counter">
      <div class="counter-item">
        <div class="counter-dot active"></div>
        <span id="remaining-count">6 available</span>
      </div>
      <div class="counter-sep"></div>
      <div class="counter-item">
        <div class="counter-dot" style="background:#10B981"></div>
        <span id="request-count">0 requested</span>
      </div>
      <div class="counter-sep"></div>
      <div class="counter-item">
        <div class="counter-dot" style="background:#3B82F6"></div>
        <span id="saved-count">0 saved</span>
      </div>
    </div>

    <!-- Card Stack Area -->
    <div class="card-stack-area" id="cardStack">

      <!-- Empty State (shown when all cards are done) -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🏠</div>
        <div class="empty-title">You've seen them all!</div>
        <div class="empty-sub">No worries — more vetted handymen are joining {{COMPANY_NAME}} every day.</div>
        <button class="empty-reload" onclick="resetDeck()">🔄 Load More Handymen</button>
      </div>

      <!-- Cards rendered by JS -->
    </div>

    <!-- Action Buttons -->
    <div class="action-bar" id="actionBar">
      <button class="action-btn btn-skip" onclick="triggerSkip()" title="Skip handyman">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <button class="action-btn btn-request" onclick="triggerRequest()" title="Request handyman">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="white" stroke="none">

<script>
  // ─────────────────────────────────────────────────────────────

      available: true,
    },
  ];

  // ─────────────────────────────────────────────────────────────
  //  STATE MANAGEMENT
  // ─────────────────────────────────────────────────────────────
  let deck = [...handymen];            // Remaining cards to show
  let requestedCount = 0;              // # of right-swipes
  let savedCount = 0;                  // # of star-saves
  let activeCard = null;               // The top card DOM element
  let isDragging = false;
  let startX = 0, startY = 0;
  let currentX = 0, currentY = 0;

  // Swipe threshold (pixels to count as a swipe)
  const SWIPE_THRESHOLD = 80;

  // ─────────────────────────────────────────────────────────────
  //  CARD RENDERING
  // ─────────────────────────────────────────────────────────────

  /**
   * Renders star rating icons.
   * @param {number} rating - Rating 0-5 (supports half stars via visual rounding)
   * @returns {string} HTML string of star SVGs
   */
  function renderStars(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
      const full = i <= Math.floor(rating);
      const half = !full && i === Math.ceil(rating) && (rating % 1) >= 0.5;
      const cls = full || half ? 'star' : 'star empty';
      html += `<span class="${cls}">${full || half ? '★' : '★'}</span>`;
    }
    return html;
  }

  /**
   * Renders a tag with appropriate color class.
   * @param {string} text - Tag label
   * @param {string} type - 'primary' | 'secondary' | 'tertiary'
   * @returns {string} Tag HTML
   */
  function renderTag(text, type) {
    return `<span class="tag tag-${type}">${text}</span>`;
  }

  /**
   * Builds a single profile card element for a handyman.
   * @param {object} data - Handyman profile data
   * @param {number} stackPos - 0=top, 1=second, 2=third (for visual stacking)
   * @returns {HTMLElement} The card element
   */
  function buildCard(data, stackPos) {
    const card = document.createElement('div');
    card.className = `profile-card${stackPos > 0 ? ` back card-${stackPos + 1}` : ''}`;
    card.dataset.id = data.id;

    const tagsHtml = data.specialties.map((s, i) => renderTag(s, data.tagTypes[i] || 'primary')).join('');

    card.innerHTML = `
      <!-- Swipe Direction Labels (shown during drag) -->
      <span class="swipe-label request" id="label-request-${data.id}">REQUEST ✓</span>
      <span class="swipe-label skip" id="label-skip-${data.id}">SKIP ✗</span>

      <!-- Drag overlay tint -->
      <div class="drag-tint" id="tint-${data.id}"></div>

      <!-- Avatar Area -->
      <div class="card-avatar-area">
        <div class="card-avatar-bg" style="background: ${data.color}">
          <span class="card-avatar-initials">${data.initials}</span>
        </div>
        <div class="card-verified-badge">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="#10B981">
            <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
          Pre-vetted
        </div>
        <div class="card-jobs-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="white">
            <path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.05 15.96 0 13.36 0c-1.31 0-2.48.53-3.37 1.36L9 2.4l-1-1.04C7.12.53 5.95 0 4.64 0 2.05 0 0 2.05 0 4.64c0 .48.11.92.18 1.36H0v14c0 1.1.9 2 2 2h20c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/>
          </svg>
          ${data.jobs} jobs done
        </div>
      </div>

      <!-- Card Body -->
      <div class="card-body">
        <div class="card-header-row">
          <div>
            <div class="card-name">${data.name}</div>
            <div class="card-location">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
              </svg>
              ${data.distance} away · ${data.available ? '🟢 Available now' : '🔴 Busy'}
            </div>
          </div>
          <div class="card-rate">
            <div class="card-rate-value">€${data.rate}</div>
            <div class="card-rate-unit">/hour</div>
          </div>
        </div>

        <div class="stars-row">
          <div class="stars">${renderStars(data.rating)}</div>
          <span class="rating-text">${data.rating} (${data.reviews} reviews)</span>
        </div>

        <div class="specialty-tags">${tagsHtml}</div>

        <div class="card-bio">${data.bio}</div>

        <div class="card-metrics">
          <div class="metric">
            <div class="metric-dot" style="background:#F59E0B"></div>
            Responds ${data.responseTime}
          </div>
          <div class="metric">
            <div class="metric-dot" style="background:#10B981"></div>
            ${data.responseRate} response rate
          </div>
        </div>
      </div>
    `;

    return card;
  }

  /**
   * Renders up to 3 cards at a time (top card + 2 peeking behind).
   * This approach limits DOM complexity for performance.
   */
  function renderDeck() {
    const stack = document.getElementById('cardStack');
    // Remove all existing cards (leave empty state)
    const existing = stack.querySelectorAll('.profile-card');
    existing.forEach(c => c.remove());

    if (deck.length === 0) {
      document.getElementById('emptyState').style.display = 'flex';
      document.getElementById('actionBar').style.opacity = '0.4';
      document.getElementById('actionBar').style.pointerEvents = 'none';
      updateCounters();
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('actionBar').style.opacity = '1';
    document.getElementById('actionBar').style.pointerEvents = 'auto';

    // Render up to 3 cards (reverse order so top card is rendered last = on top)
    const toRender = deck.slice(0, 3).reverse();
    toRender.forEach((data, revIdx) => {
      const stackPos = (toRender.length - 1) - revIdx; // 0 = top card
      const card = buildCard(data, stackPos);
      stack.appendChild(card);
    });

    // Attach drag handlers to the top card only
    const topCard = stack.querySelector('.profile-card:not(.back)');
    if (topCard) {
      activeCard = topCard;
      attachDragHandlers(topCard);
      // Hint animation on first load
      if (deck.length === handymen.length) {
        setTimeout(() => topCard.classList.add('hint-animate'), 800);
      }
    }

    updateCounters();
  }

  // ─────────────────────────────────────────────────────────────
  //  COUNTER UPDATES
  // ─────────────────────────────────────────────────────────────

  function updateCounters() {
    document.getElementById('remaining-count').textContent = `${deck.length} available`;
    document.getElementById('request-count').textContent = `${requestedCount} requested`;
    document.getElementById('saved-count').textContent = `${savedCount} saved`;
  }

  // ─────────────────────────────────────────────────────────────
  //  DRAG / SWIPE EVENT HANDLERS
  // ─────────────────────────────────────────────────────────────

  /**
   * Attaches pointer, mouse, and touch event listeners to a card.
   * Unified pointer events are used for cross-device support.
   * @param {HTMLElement} card - The card DOM element
   */
  function attachDragHandlers(card) {
    // Pointer Events (modern browsers — handles both touch and mouse)
    card.addEventListener('pointerdown', onDragStart, { passive: true });
    card.addEventListener('pointermove', onDragMove, { passive: true });
    card.addEventListener('pointerup', onDragEnd, { passive: true });
    card.addEventListener('pointercancel', onDragCancel, { passive: true });

    // Prevent context menu on long press
    card.addEventListener('contextmenu', e => e.preventDefault());
  }

  function onDragStart(e) {
    if (isDragging) return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    currentX = 0;
    currentY = 0;

    activeCard.style.transition = 'none'; // Disable transition during active drag
    activeCard.setPointerCapture(e.pointerId);
  }

  function onDragMove(e) {
    if (!isDragging || !activeCard) return;

    currentX = e.clientX - startX;
    currentY = e.clientY - startY;

    // Rotation: tilt card proportional to horizontal drag
    const rotation = currentX * 0.08; // ~8 degrees at full threshold
    activeCard.style.transform = `translate(${currentX}px, ${currentY * 0.4}px) rotate(${rotation}deg)`;

    // Calculate swipe intention (0 to 1 in each direction)
    const swipeRatio = Math.abs(currentX) / SWIPE_THRESHOLD;
    const clamped = Math.min(swipeRatio, 1);

    // Show directional labels and tint overlay
    const cardId = activeCard.dataset.id;
    const requestLabel = document.getElementById(`label-request-${cardId}`);
    const skipLabel = document.getElementById(`label-skip-${cardId}`);
    const tint = document.getElementById(`tint-${cardId}`);

    if (currentX > 20) {
      // Swiping right = REQUEST
      if (requestLabel) requestLabel.style.opacity = clamped;
      if (skipLabel) skipLabel.style.opacity = 0;
      if (tint) { tint.className = 'drag-tint request'; tint.style.opacity = clamped * 0.6; }
    } else if (currentX < -20) {
      // Swiping left = SKIP
      if (skipLabel) skipLabel.style.opacity = clamped;
      if (requestLabel) requestLabel.style.opacity = 0;
      if (tint) { tint.className = 'drag-tint skip'; tint.style.opacity = clamped * 0.6; }
    } else {
      // Center: hide labels
      if (requestLabel) requestLabel.style.opacity = 0;
      if (skipLabel) skipLabel.style.opacity = 0;
      if (tint) tint.style.opacity = 0;
    }
  }

  function onDragEnd(e) {
    if (!isDragging || !activeCard) return;
    isDragging = false;

    // Decision: has user swiped past the threshold?
    if (currentX > SWIPE_THRESHOLD) {
      // Right swipe = REQUEST
      flyOut('right');
    } else if (currentX < -SWIPE_THRESHOLD) {
      // Left swipe = SKIP
      flyOut('left');
    } else {
      // Snap back to center
      snapBack();
    }
  }

  function onDragCancel() {
    if (!isDragging) return;
    isDragging = false;
    snapBack();
  }

  // ─────────────────────────────────────────────────────────────
  //  CARD ANIMATIONS
  // ─────────────────────────────────────────────────────────────

  /**
   * Animates the top card flying off in a given direction.
   * @param {'left'|'right'} direction
   */
  function flyOut(direction) {
    if (!activeCard) return;

    const card = activeCard;
    activeCard = null;

    // Determine exit rotation and X position
    const exitX = direction === 'right' ? 800 : -800;
    const exitRotation = direction === 'right' ? 25 : -25;

    card.classList.add('animating');
    card.style.transform = `translate(${exitX}px, ${currentY * 0.3}px) rotate(${exitRotation}deg)`;
    card.style.opacity = '0';

    // Process action
    if (direction === 'right') {
      handleRequest(card.dataset.id);
    } else {
      handleSkip(card.dataset.id);
    }

    // Remove card and re-render deck after animation
    setTimeout(() => {
      card.remove();
      renderDeck();
    }, 380);
  }

  /**
   * Snaps card back to center (when drag didn't exceed threshold).
   */
  function snapBack() {
    if (!activeCard) return;
    const card = activeCard;
    card.classList.add('animating');
    card.style.transform = '';
    card.style.opacity = '1';

    // Reset labels/tint
    const cardId = card.dataset.id;
    const requestLabel = document.getElementById(`label-request-${cardId}`);
    const skipLabel = document.getElementById(`label-skip-${cardId}`);
    const tint = document.getElementById(`tint-${cardId}`);
    if (requestLabel) requestLabel.style.opacity = 0;
    if (skipLabel) skipLabel.style.opacity = 0;
    if (tint) tint.style.opacity = 0;

    setTimeout(() => card.classList.remove('animating'), 360);
  }

  // ─────────────────────────────────────────────────────────────
  //  ACTION HANDLERS (called by swipe AND by buttons)
  // ─────────────────────────────────────────────────────────────

  function handleRequest(cardId) {
    const handyman = deck.find(h => h.id == cardId) || handymen.find(h => h.id == cardId);
    deck = deck.filter(h => h.id != cardId);
    requestedCount++;
    const name = handyman ? handyman.name.split(' ')[0] : 'Handyman';
    showToast(`✅ Request sent to ${name}!`, 'request');
  }

  function handleSkip(cardId) {
    const handyman = deck.find(h => h.id == cardId) || handymen.find(h => h.id == cardId);
    deck = deck.filter(h => h.id != cardId);
    const name = handyman ? handyman.name.split(' ')[0] : 'Handyman';
    showToast(`⏭ Skipped ${name}`, 'skip');
  }

  function handleSave(cardId) {
    const handyman = deck.find(h => h.id == cardId) || handymen.find(h => h.id == cardId);
    deck = deck.filter(h => h.id != cardId);
    savedCount++;
    const name = handyman ? handyman.name.split(' ')[0] : 'Handyman';
    showToast(`⭐ ${name} saved for later`, 'save');
  }

  // ─────────────────────────────────────────────────────────────
  //  BUTTON TRIGGERS (call flyOut programmatically)
  // ─────────────────────────────────────────────────────────────

  function triggerSkip() {
    if (!activeCard || isDragging) return;
    currentX = 0;
    currentY = 0;
    flyOut('left');
  }

  function triggerRequest() {
    if (!activeCard || isDragging) return;
    currentX = 0;
    currentY = 0;
    flyOut('right');
  }

  function triggerSave() {
    if (!activeCard || isDragging) return;
    const cardId = activeCard.dataset.id;
    const card = activeCard;
    activeCard = null;

    // Animate: float upward and fade
    card.classList.add('animating');
    card.style.transform = 'translateY(-120px) scale(0.85)';
    card.style.opacity = '0';

    handleSave(cardId);

    setTimeout(() => {
      card.remove();
      renderDeck();
    }, 380);
  }

  // ─────────────────────────────────────────────────────────────
  //  TOAST NOTIFICATION
  // ─────────────────────────────────────────────────────────────

  let toastTimeout;

  /**
   * Shows a temporary toast notification.
   * @param {string} message - Text to display
   * @param {'request'|'skip'|'save'} type - Visual style
   */
  function showToast(message, type) {
    const toast = document.getElementById('toast');
    if (!toast) return;

    // Clear existing timeout
    clearTimeout(toastTimeout);
    toast.classList.remove('show', 'request-toast', 'skip-toast', 'save-toast');

    toast.textContent = message;
    toast.classList.add(`${type}-toast`);

    // Force reflow for animation restart
    void toast.offsetWidth;
    toast.classList.add('show');

    toastTimeout = setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ─────────────────────────────────────────────────────────────
  //  NAVIGATION
  // ─────────────────────────────────────────────────────────────

  function setNav(el) {
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');

    // For demo purposes, show a toast for non-home tabs
    const label = el.querySelector('.nav-label').textContent;
    if (label !== 'Home') {
      showToast(`${label} — coming soon!`, 'save');
      setTimeout(() => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelectorAll('.nav-item')[0].classList.add('active');
      }, 1500);
    }
  }

  // ─────────────────────────────────────────────────────────────
  //  RESET / RELOAD DECK
  // ─────────────────────────────────────────────────────────────

  function resetDeck() {
    deck = [...handymen];
    requestedCount = 0;
    savedCount = 0;
    renderDeck();
    showToast('🎉 Fresh batch loaded!', 'request');
  }

  // ─────────────────────────────────────────────────────────────
  //  KEYBOARD SUPPORT (for desktop testing)
  // ─────────────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  triggerSkip();
    if (e.key === 'ArrowRight') triggerRequest();
    if (e.key === 'ArrowUp')    triggerSave();
  });

  // ─────────────────────────────────────────────────────────────
  //  INITIALIZATION
  // ─────────────────────────────────────────────────────────────
  renderDeck();

</script>
